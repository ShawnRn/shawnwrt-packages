name: Package

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: opkg
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck cmake build-essential
      - name: Build usign
        run: |
          set -euo pipefail
          git clone --depth 1 https://git.openwrt.org/project/usign.git /tmp/usign
          cmake -S /tmp/usign -B /tmp/usign/build
          cmake --build /tmp/usign/build
          sudo install -m 0755 /tmp/usign/build/usign /usr/local/bin/usign
      - name: Check shell script
        run: shellcheck src/usr/bin/shawnwrt-ota
      - name: Build opkg feed
        env:
          SHAWNWRT_OTA_USIGN_SECRET_KEY: ${{ secrets.SHAWNWRT_OTA_USIGN_SECRET_KEY }}
        run: scripts/build-opkg-feed.sh
      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: shawnwrt-ota-opkg-feed
          path: dist/*
      - name: Publish opkg branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          worktree="$(mktemp -d)"
          git -C "$worktree" init
          git -C "$worktree" remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git -C "$worktree" checkout --orphan opkg
          cp -a dist/. "$worktree/"
          git -C "$worktree" add .
          git -C "$worktree" commit -m "Publish opkg feed"
          git -C "$worktree" push --force origin opkg
