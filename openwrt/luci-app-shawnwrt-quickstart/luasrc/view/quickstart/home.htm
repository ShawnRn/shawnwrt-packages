<%+header%>
<div id="swrt-dashboard" class="swrt-dashboard">
    <style>
        .swrt-dashboard {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            color: var(--textColor) !important;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 0;
        }

        .swrt-dash-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
        }

        .swrt-dash-title-group h1 { font-size: 2.2rem; font-weight: 700; margin: 0 0 0.5rem 0; color: var(--textColor) !important; border: none; padding: 0; background: none; }
        
        .swrt-net-status { display: flex; align-items: center; gap: 0.6rem; font-size: 1rem; font-weight: 500; }
        .swrt-status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
        .swrt-net-status.online .swrt-status-dot { background: var(--progressbar); box-shadow: 0 0 10px var(--progressbar); }
        .swrt-net-status.offline .swrt-status-dot { background: #ff3b30; box-shadow: 0 0 10px #ff3b30; }

        .swrt-dash-meta { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 0.6rem; }
        #swrt-uptime { color: var(--textColor) !important; opacity: 0.6; font-size: 0.95rem; font-family: ui-monospace, monospace; }

        .swrt-capsule {
            background: var(--activeColor);
            color: var(--bttextColor) !important;
            padding: 4px 14px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Cards */
        .swrt-dash-card {
            background: var(--sectionbgColor) !important;
            border: 1px solid var(--borderColor) !important;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--sectionShaddow);
        }

        .swrt-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .swrt-card-header h3 { font-size: 1.2rem; font-weight: 600; margin: 0; color: var(--textColor) !important; }

        .swrt-speed-legend { display: flex; gap: 1.5rem; font-size: 0.9rem; }
        .swrt-speed-legend span { display: flex; align-items: center; gap: 0.5rem; color: var(--textColor); opacity: 0.6; }
        .swrt-speed-legend strong { color: var(--textColor); font-family: ui-monospace, monospace; min-width: 90px; text-align: right; }
        .swrt-legend-dot { width: 8px; height: 8px; border-radius: 50%; }
        .swrt-speed-legend .down .swrt-legend-dot { background: #007aff; }
        .swrt-speed-legend .up .swrt-legend-dot { background: #5856d6; }

        .swrt-chart-container { height: 200px; width: 100%; position: relative; margin-top: 1rem; }
        #swrt-speed-chart { width: 100%; height: 100%; }

        .swrt-dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; }

        /* Hardware Card */
        .swrt-hw-item { margin-bottom: 1.2rem; }
        .swrt-hw-item label { display: block; font-size: 0.9rem; color: var(--textColor); opacity: 0.6; margin-bottom: 0.6rem; }
        .swrt-progress-track { height: 8px; background: var(--progressbarColor); border-radius: 10px; overflow: hidden; margin-bottom: 0.4rem; }
        .swrt-progress-fill { height: 100%; background: var(--progressbar); width: 0%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .swrt-hw-item span { font-size: 1rem; font-weight: 600; font-family: ui-monospace, monospace; }

        /* Interface List */
        .swrt-if-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--borderColor); }
        .swrt-if-item:last-child { border-bottom: none; }
        .swrt-if-name { font-size: 1.05rem; font-weight: 600; }
        .swrt-if-ip { font-size: 0.85rem; color: var(--textColor); opacity: 0.6; font-family: ui-monospace, monospace; }
        .swrt-if-speed { font-size: 0.9rem; font-weight: 500; }
        .swrt-if-tag { font-size: 0.75rem; padding: 2px 8px; border-radius: 6px; background: var(--badgebgColor); color: var(--textColor); margin-left: 0.5rem; }

        /* Footer */
        .swrt-dash-footer { display: flex; flex-wrap: wrap; gap: 1.2rem; justify-content: center; margin-top: 2rem; }
        .swrt-dash-btn {
            background: var(--inputbgColor) !important;
            border: 1px solid var(--inputBorder) !important;
            color: var(--inputtextColor) !important;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .swrt-dash-btn:hover { background: var(--activeColor) !important; color: var(--bttextColor) !important; transform: translateY(-2px); }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .swrt-dash-header { flex-direction: column; gap: 1.5rem; }
            .swrt-dash-meta { text-align: left; align-items: flex-start; }
            .swrt-dash-grid { grid-template-columns: 1fr; }
        }
    </style>

    <header class="swrt-dash-header">
        <div class="swrt-dash-title-group">
            <h1 id="swrt-device-name">ShawnWrt</h1>
            <div id="swrt-net-indicator" class="swrt-net-status offline">
                <span class="swrt-status-dot"></span>
                <span class="swrt-status-text">正在检测联网...</span>
            </div>
        </div>
        <div class="swrt-dash-meta">
            <span id="swrt-uptime">运行时间: --:--:--</span>
            <div id="swrt-ota-capsule" class="swrt-capsule hidden">发现新版本</div>
        </div>
    </header>

    <section class="swrt-dash-section">
        <div class="swrt-dash-card swrt-chart-card">
            <div class="swrt-card-header">
                <h3>实时流量监控</h3>
                <div class="swrt-speed-legend">
                    <span class="down"><span class="swrt-legend-dot"></span> 下载 <strong id="swrt-cur-down">0 KB/s</strong></span>
                    <span class="up"><span class="swrt-legend-dot"></span> 上传 <strong id="swrt-cur-up">0 KB/s</strong></span>
                </div>
            </div>
            <div class="swrt-chart-container">
                <canvas id="swrt-speed-chart"></canvas>
            </div>
        </div>
    </section>

    <section class="swrt-dash-grid">
        <div class="swrt-dash-card swrt-hw-card">
            <div class="swrt-card-header"><h3>硬件资源</h3></div>
            <div class="swrt-hw-item">
                <label>CPU 负载</label>
                <div class="swrt-progress-track"><div id="swrt-cpu-bar" class="swrt-progress-fill"></div></div>
                <span id="swrt-cpu-val">0%</span>
            </div>
            <div class="swrt-hw-item">
                <label>内存占用</label>
                <div class="swrt-progress-track"><div id="swrt-mem-bar" class="swrt-progress-fill"></div></div>
                <span id="swrt-mem-val">0%</span>
            </div>
            <div class="swrt-hw-item">
                <label>核心温度</label>
                <span id="swrt-temp-val">0 °C</span>
            </div>
        </div>

        <div class="swrt-dash-card swrt-if-card">
            <div class="swrt-card-header"><h3>网络接口</h3></div>
            <div id="swrt-if-list" class="swrt-if-list"></div>
        </div>
    </section>

    <footer class="swrt-dash-footer">
        <button class="swrt-dash-btn" onclick="location.href='<%=luci.dispatcher.build_url('admin/system/reboot')%>'">立即重启</button>
        <button class="swrt-dash-btn" onclick="location.href='<%=luci.dispatcher.build_url('admin/network/wireless')%>'">无线管理</button>
        <button class="swrt-dash-btn" onclick="location.href='<%=luci.dispatcher.build_url('admin/system/shawnwrt-ota')%>'">系统更新</button>
    </footer>

    <script src="/luci-static/quickstart/index.js?v=<%=os.time()%>"></script>
</div>
<%+footer%>
